services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      KB_DB_PATH: /data/knowledge_base.db
    volumes:
      - ./backend/app:/app/app
      - ./.localdata/backend-dev:/data
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE: /api
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "3000:80"
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  frontend_dev_node_modules:
