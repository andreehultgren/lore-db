services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      KB_DB_PATH: /data/knowledge_base.db
    volumes:
      - ./.localdata/backend:/data
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.mcp_server"]
    environment:
      KB_API_BASE: http://backend:8000
      KB_NAMESPACE: lore-db
      MCP_TRANSPORT: streamable-http
      MCP_MOUNT_PATH: /mcp
      FASTMCP_HOST: 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8765:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
